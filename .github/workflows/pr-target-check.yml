name: PR Target Branch Check
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request_target:
    types: [opened, edited]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-target:
    runs-on: ubuntu-latest
    # Skip main→main PRs (maintainer releases)
    if: >-
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref != 'main'
    steps:
      - name: Add wrong-base label
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Add label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['wrong-base']
            });

            // Post comment
            const body = `👋 Thanks for the PR! It looks like this targets \`main\`, but all PRs should target the **\`main\`** branch.

            Please update the base branch:
            1. Click **Edit** at the top right of this PR
            2. Change the base branch from \`main\` to \`main\`

            See [CONTRIBUTING.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md) for details.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: body
            });
